<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { background-color: #1a1a1a; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
        #board {
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            width: 95vw; max-width: 400px; aspect-ratio: 1/1;
            background-image: url('board.png'); background-size: 100% 100%;
            border: 2px solid #444; position: relative;
        }
        .square { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .piece { width: 90%; height: 90%; background-size: contain; background-repeat: no-repeat; background-position: center; cursor: pointer; z-index: 10; }
        .highlight { width: 30%; height: 30%; background: rgba(255, 255, 0, 0.5); border-radius: 50%; position: absolute; pointer-events: none; }
        .selected { background-color: rgba(0, 255, 0, 0.2); }
        .flipped { transform: rotate(180deg); }
        .flipped .piece { transform: rotate(180deg); }
    </style>
</head>
<body>
    <div id="board"></div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // الحصول على لون اللاعب من الرابط (سيقوم البوت بإرساله)
        const urlParams = new URLSearchParams(window.location.search);
        const playerColor = urlParams.get('color') || 'w'; 

        const game = new Chess();
        const boardElement = document.getElementById('board');
        if (playerColor === 'b') boardElement.classList.add('flipped');

        const pieceNames = { 'p': 'pawn', 'r': 'rook', 'n': 'knight', 'b': 'bishop', 'q': 'queen', 'k': 'king' };

        function drawBoard() {
            boardElement.innerHTML = '';
            const boardData = game.board();
            // إذا كان اللاعب أسود، نعكس عرض المصفوفة
            const displayBoard = playerColor === 'b' ? [...boardData].reverse() : boardData;

            for (let r = 0; r < 8; r++) {
                const rowData = playerColor === 'b' ? [...displayBoard[r]].reverse() : displayBoard[r];
                for (let c = 0; c < 8; c++) {
                    const squareDiv = document.createElement('div');
                    squareDiv.className = 'square';
                    
                    // حساب اسم المربع الحقيقي
                    const realR = playerColor === 'b' ? r : 7 - r;
                    const realC = playerColor === 'b' ? 7 - c : c;
                    const squareName = String.fromCharCode(97 + realC) + (realR + 1);
                    
                    const piece = rowData[c];
                    if (piece) {
                        const pieceDiv = document.createElement('div');
                        pieceDiv.className = 'piece';
                        pieceDiv.style.backgroundImage = `url('${piece.color}_${pieceNames[piece.type]}.png')`;
                        squareDiv.appendChild(pieceDiv);
                    }
                    squareDiv.onclick = () => onSquareClick(squareName);
                    boardElement.appendChild(squareDiv);
                }
            }
        }

        function onSquareClick(square) {
            // منع اللاعب من تحريك قطع الخصم
            const piece = game.get(square);
            if (piece && piece.color !== playerColor && !selectedSquare) return;

            if (selectedSquare) {
                const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                if (move) {
                    drawBoard();
                    tg.sendData(JSON.stringify({ move: move.san, color: playerColor }));
                    selectedSquare = null;
                    return;
                }
            }
            
            const moves = game.moves({ square: square, verbose: true });
            removeHighlights();
            if (moves.length > 0) {
                selectedSquare = square;
                moves.forEach(m => {
                    const h = document.createElement('div');
                    h.className = 'highlight';
                    // البحث عن المربع في الواجهة لإضاءته
                    drawBoard(); // إعادة الرسم للتأكد من التحديث
                });
            }
        }

        function removeHighlights() {
            selectedSquare = null;
            drawBoard();
        }

        drawBoard();
    </script>
</body>
</html>
