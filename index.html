<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a1a; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #board-container {
            width: 95vw; max-width: 400px; aspect-ratio: 1/1;
            background-image: url('board.png'); background-size: 100% 100%;
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            border: 2px solid #444;
        }
        .piece { width: 100%; height: 100%; background-size: 80%; background-repeat: no-repeat; background-position: center; }
        button { margin-top: 20px; padding: 12px 30px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="board-container">
        <div class="piece" style="background-image: url('b_rook.png'); grid-column: 1; grid-row: 1;"></div>
        <div class="piece" style="background-image: url('b_knight.png'); grid-column: 2; grid-row: 1;"></div>
        <div class="piece" style="background-image: url('b_bishop.png'); grid-column: 3; grid-row: 1;"></div>
        <div class="piece" style="background-image: url('b_queen.png'); grid-column: 4; grid-row: 1;"></div>
        <div class="piece" style="background-image: url('b_king.png'); grid-column: 5; grid-row: 1;"></div>
        <div class="piece" style="background-image: url('b_bishop.png'); grid-column: 6; grid-row: 1;"></div>
        <div class="piece" style="background-image: url('b_knight.png'); grid-column: 7; grid-row: 1;"></div>
        <div class="piece" style="background-image: url('b_rook.png'); grid-column: 8; grid-row: 1;"></div>
        <div class="piece" style="background-image: url('b_pawn.png'); grid-column: 1; grid-row: 2;"></div>
        <div class="piece" style="background-image: url('b_pawn.png'); grid-column: 2; grid-row: 2;"></div>
        <div class="piece" style="background-image: url('b_pawn.png'); grid-column: 3; grid-row: 2;"></div>
        <div class="piece" style="background-image: url('b_pawn.png'); grid-column: 4; grid-row: 2;"></div>
        <div class="piece" style="background-image: url('b_pawn.png'); grid-column: 5; grid-row: 2;"></div>
        <div class="piece" style="background-image: url('b_pawn.png'); grid-column: 6; grid-row: 2;"></div>
        <div class="piece" style="background-image: url('b_pawn.png'); grid-column: 7; grid-row: 2;"></div>
        <div class="piece" style="background-image: url('b_pawn.png'); grid-column: 8; grid-row: 2;"></div>

        <div class="piece" style="background-image: url('w_rook.png'); grid-column: 1; grid-row: 8;"></div>
        <div class="piece" style="background-image: url('w_knight.png'); grid-column: 2; grid-row: 8;"></div>
        <div class="piece" style="background-image: url('w_bishop.png'); grid-column: 3; grid-row: 8;"></div>
        <div class="piece" style="background-image: url('w_queen.png'); grid-column: 4; grid-row: 8;"></div>
        <div class="piece" style="background-image: url('w_king.png'); grid-column: 5; grid-row: 8;"></div>
        <div class="piece" style="background-image: url('w_bishop.png'); grid-column: 6; grid-row: 8;"></div>
        <div class="piece" style="background-image: url('w_knight.png'); grid-column: 7; grid-row: 8;"></div>
        <div class="piece" style="background-image: url('w_rook.png'); grid-column: 8; grid-row: 8;"></div>
        <div class="piece" style="background-image: url('w_pawn.png'); grid-column: 1; grid-row: 7;"></div>
        <div class="piece" style="background-image: url('w_pawn.png'); grid-column: 2; grid-row: 7;"></div>
        <div class="piece" style="background-image: url('w_pawn.png'); grid-column: 3; grid-row: 7;"></div>
        <div class="piece" style="background-image: url('w_pawn.png'); grid-column: 4; grid-row: 7;"></div>
        <div class="piece" style="background-image: url('w_pawn.png'); grid-column: 5; grid-row: 7;"></div>
        <div class="piece" style="background-image: url('w_pawn.png'); grid-column: 6; grid-row: 7;"></div>
        <div class="piece" style="background-image: url('w_pawn.png'); grid-column: 7; grid-row: 7;"></div>
        <div class="piece" style="background-image: url('w_pawn.png'); grid-column: 8; grid-row: 7;"></div>
    </div>
    <button onclick="tg.sendData('start_game')">ابدأ المباراة</button>
    <script>const tg = window.Telegram.WebApp; tg.expand();</script>
</body>
</html>
