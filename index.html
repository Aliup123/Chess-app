<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a1a; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
        #board-container {
            width: 95vw; max-width: 400px; aspect-ratio: 1/1;
            background-image: url('board.png'); background-size: 100% 100%;
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            border: 2px solid #444; position: relative;
        }
        .piece { 
            width: 100%; height: 100%; 
            background-size: 80%; background-repeat: no-repeat; background-position: center; 
            cursor: pointer; z-index: 10; touch-action: none;
        }
        .dragging { opacity: 0.5; z-index: 100; }
    </style>
</head>
<body>
    <div id="board-container">
        <div class="piece" draggable="true" style="background-image: url('b_king.png'); grid-column: 5; grid-row: 1;"></div>
        <div class="piece" draggable="true" style="background-image: url('w_king.png'); grid-column: 5; grid-row: 8;"></div>
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const pieces = document.querySelectorAll('.piece');
        const board = document.getElementById('board-container');

        let selectedPiece = null;

        pieces.forEach(piece => {
            // لبدء السحب عند اللمس
            piece.addEventListener('touchstart', (e) => {
                selectedPiece = piece;
                piece.classList.add('dragging');
            });

            // عند تحريك الإصبع
            piece.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = board.getBoundingClientRect();
                
                // حساب المربع الجديد بناءً على موقع الإصبع
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                
                const col = Math.ceil(x / (rect.width / 8));
                const row = Math.ceil(y / (rect.height / 8));

                if (col >= 1 && col <= 8 && row >= 1 && row <= 8) {
                    piece.style.gridColumn = col;
                    piece.style.gridRow = row;
                }
            });

            // عند رفع الإصبع
            piece.addEventListener('touchend', () => {
                if (selectedPiece) {
                    selectedPiece.classList.remove('dragging');
                    // هنا سنرسل الإحداثيات للبوت لاحقاً
                    const moveData = `Move:${selectedPiece.style.gridColumn},${selectedPiece.style.gridRow}`;
                    console.log(moveData);
                    selectedPiece = null;
                }
            });
        });
    </script>
</body>
</html>
