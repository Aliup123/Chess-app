<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { background-color: #1a1a1a; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #board {
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            width: 95vw; max-width: 400px; aspect-ratio: 1/1;
            background-image: url('board.png'); background-size: 100% 100%;
            border: 2px solid #444; position: relative;
        }
        .square { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .piece { width: 90%; height: 90%; background-size: contain; background-repeat: no-repeat; background-position: center; cursor: pointer; z-index: 10; }
        .highlight { width: 30%; height: 30%; background: rgba(255, 255, 0, 0.5); border-radius: 50%; position: absolute; pointer-events: none; }
        .selected { background-color: rgba(0, 255, 0, 0.2); }
    </style>
</head>
<body>
    <div id="board"></div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const game = new Chess();
        const boardElement = document.getElementById('board');
        let selectedSquare = null;

        const pieceNames = { 'p': 'pawn', 'r': 'rook', 'n': 'knight', 'b': 'bishop', 'q': 'queen', 'k': 'king' };

        function drawBoard() {
            boardElement.innerHTML = '';
            const boardData = game.board();
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const squareDiv = document.createElement('div');
                    squareDiv.className = 'square';
                    const squareName = String.fromCharCode(97 + c) + (8 - r);
                    squareDiv.dataset.square = squareName;

                    const piece = boardData[r][c];
                    if (piece) {
                        const pieceDiv = document.createElement('div');
                        pieceDiv.className = 'piece';
                        // التسمية كما طلبت: w_pawn.png أو b_knight.png
                        const imgName = `${piece.color}_${pieceNames[piece.type]}.png`;
                        pieceDiv.style.backgroundImage = `url('${imgName}')`;
                        squareDiv.appendChild(pieceDiv);
                    }
                    squareDiv.onclick = () => onSquareClick(squareName);
                    boardElement.appendChild(squareDiv);
                }
            }
        }

        function onSquareClick(square) {
            if (selectedSquare) {
                const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                if (move) {
                    drawBoard();
                    tg.sendData(JSON.stringify({ move: move.san, fen: game.fen() }));
                    selectedSquare = null;
                    if (game.game_over()) alert("انتهت المباراة!");
                    return;
                }
            }
            
            const moves = game.moves({ square: square, verbose: true });
            removeHighlights();
            if (moves.length > 0) {
                selectedSquare = square;
                document.querySelector(`[data-square="${square}"]`).classList.add('selected');
                moves.forEach(m => {
                    const h = document.createElement('div');
                    h.className = 'highlight';
                    document.querySelector(`[data-square="${m.to}"]`).appendChild(h);
                });
            } else { selectedSquare = null; }
        }

        function removeHighlights() {
            document.querySelectorAll('.highlight').forEach(h => h.remove());
            document.querySelectorAll('.selected').forEach(s => s.classList.remove('selected'));
        }

        drawBoard();
    </script>
</body>
</html>
