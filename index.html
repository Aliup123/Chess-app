<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elar Chess</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif;
        }
        #chess-board {
            width: 320px; /* تصغير للعرض فقط، سيتمدد حسب الشاشة */
            height: 320px;
            background-image: url('assets/board.png'); /* رابط صورتك */
            background-size: cover;
            border: 2px solid #555;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="chess-board"></div>
    <button onclick="startGame()">Start Game | ابدأ المباراة</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // يفتح التطبيق بكامل شاشة الهاتف

        function startGame() {
            // يرسل كلمة start_game لبوت الجافا
            tg.sendData("start_game"); 
            // يغلق الواجهة بعد الإرسال (اختياري)
            // tg.close(); 
        }
    </script>
</body>
</html>
