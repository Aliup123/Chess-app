<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a1a; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #board-container {
            width: 90vw;
            max-width: 350px;
            aspect-ratio: 1 / 1;
            background-image: url('board.png'); /* تم التعديل هنا */
            background-size: 100% 100%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 2px solid #444;
        }

        .piece { width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }

        button {
            margin-top: 25px;
            padding: 15px 35px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="board-container">
        <div class="piece" style="background-image: url('b_king.png'); grid-column: 5; grid-row: 1;"></div>
        <div class="piece" style="background-image: url('w_king.png'); grid-column: 5; grid-row: 8;"></div>
    </div>

    <button onclick="startGame()">ابدأ المباراة</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function startGame() {
            tg.sendData("start_game");
        }
    </script>
</body>
</html>
